quality-requirements-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Добавлены pytest и httpx (или requests), так как они нужны для работы TestClient в FastAPI
          pip install numpy faster-whisper transformers pytest httpx 
          # Если у вас есть requirements.txt, лучше использовать: pip install -r requirements.txt

      - name: Run Unauthorized Audio Access Quality Test (QRT-001)
        run: |
          pytest scripts/test_security.py          

      - name: Run Transcription Quality Test (QRT-002)
        run: |
          python scripts/transcription_quality_test.py

      - name: Initialize Database (Create Admin)
        run: |
          python backend/src/init_db.py

      - name: Run Authentication Performance Test (QRT-003)
        run: |
          pytest scripts/test_auth_perf.py
